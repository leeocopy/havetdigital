<svg width="600" height="400" viewBox="0 0 600 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect x="40" y="40" width="520" height="320" rx="12" fill="white" stroke="rgba(15,23,42,0.1)"/>
  
  <!-- Grid Background -->
  <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
    <path d="M 20 0 L 0 0 0 20" fill="none" stroke="rgba(15,23,42,0.02)"/>
  </pattern>
  <rect x="40" y="40" width="520" height="320" rx="12" fill="url(#grid)"/>

  <!-- Curved Node Line -->
  <path d="M 200 120 C 300 120, 240 240, 360 240" fill="none" stroke="#52AFDA" stroke-width="4" stroke-dasharray="8 4"/>

  <!-- Trigger Node -->
  <rect x="80" y="80" width="140" height="80" rx="12" fill="#FFFFFF" stroke="rgba(15,23,42,0.1)" stroke-width="2"/>
  <rect x="80" y="80" width="140" height="32" rx="12" fill="#5C48B1"/>
  <rect x="92" y="132" width="100" height="8" rx="4" fill="#E2E8F0"/>
  <rect x="92" y="146" width="60" height="6" rx="3" fill="#E2E8F0"/>

  <!-- Middle Action Node -->
  <rect x="240" y="180" width="40" height="40" rx="20" fill="#52AFDA"/>
  <circle cx="260" cy="200" r="12" fill="white" opacity="0.8"/>

  <!-- End Action Node -->
  <rect x="360" y="200" width="140" height="80" rx="12" fill="#FFFFFF" stroke="rgba(15,23,42,0.1)" stroke-width="2"/>
  <rect x="360" y="200" width="140" height="32" rx="12" fill="#5C48B1"/>
  <rect x="372" y="252" width="100" height="8" rx="4" fill="#E2E8F0"/>
  <rect x="372" y="266" width="60" height="6" rx="3" fill="#E2E8F0"/>

  <!-- Float Window -->
  <rect x="420" y="60" width="120" height="90" rx="8" fill="#FBFBFD" stroke="rgba(15,23,42,0.1)"/>
  <rect x="432" y="72" width="80" height="8" rx="4" fill="#0B0D12"/>
  <rect x="432" y="90" width="96" height="4" rx="2" fill="#E2E8F0"/>
  <rect x="432" y="100" width="70" height="4" rx="2" fill="#E2E8F0"/>
  <rect x="432" y="120" width="40" height="16" rx="4" fill="#5C48B1"/>
</svg>
